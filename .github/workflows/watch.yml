name: Market Watcher

on:
  schedule:
    # Every 2 hours during US market-adjacent hours, weekdays.
    # GitHub cron is UTC. Stays well within the free tier.
    - cron: "0 12,14,16,18,20,22 * * 1-5"
  workflow_dispatch: {}   # manual run button

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python watcher/main.py

      - name: Maintain paper positions
        env:
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python watcher/paper_trade.py maintain

      - name: Macro watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watcher/macro.py || true

      - name: Generate actions
        run: python watcher/actions.py || true

      - name: Price real holdings
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python watcher/holdings.py || true

      - name: Performance snapshot
        env:
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          python watcher/snapshot.py
          cp watcher/trades_log.csv docs/trades_log.csv 2>/dev/null || true

      - name: Persist state
        if: always()
        run: |
          git config user.name "watcher-bot"
          git config user.email "bot@users.noreply.github.com"
          git add watcher/seen_items.json watcher/open_positions.json watcher/trades_log.csv docs/performance.json docs/trades_log.csv docs/actions.json docs/my_holdings.json || true
          git diff --cached --quiet || git commit -m "state: $(date -u +%F_%H%M)"
          git push
